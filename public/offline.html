<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>RideOn — You’re offline</title>
    <meta name="theme-color" content="#00529B" />
    <style>
      :root {
        --bg: #f8fafc;
        --fg: #0f172a;
        --card-bg: rgba(255,255,255,0.5);
        --card-border: rgba(226,232,240,0.8);
        --shadow: 0 10px 15px -3px rgba(0,0,0,0.1), 0 4px 6px -4px rgba(0,0,0,0.1);
        --brand: #00529B;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #0b1220;
          --fg: #e2e8f0;
          --card-bg: rgba(15,23,42,0.5);
          --card-border: rgba(30,41,59,0.6);
          --shadow: 0 10px 25px rgba(0,0,0,0.35);
        }
      }
      html, body {
        height: 100%;
      }
      body {
        margin: 0;
        background: var(--bg);
        color: var(--fg);
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji", "Segoe UI Emoji";
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        display: grid;
        place-items: center;
      }
      .card {
        backdrop-filter: blur(16px);
        background: var(--card-bg);
        border: 1px solid var(--card-border);
        box-shadow: var(--shadow);
        border-radius: 16px;
        padding: 24px;
        max-width: 560px;
        margin: 24px;
        transition: box-shadow 300ms ease, transform 300ms ease;
      }
      .card:hover { box-shadow: 0 25px 50px -12px rgba(0,0,0,0.35); transform: translateY(-2px); }
      h1 { font-size: 1.25rem; line-height: 1.75rem; margin: 0 0 8px; }
      p { margin: 0 0 16px; opacity: 0.9; }
      .actions { display: flex; gap: 12px; flex-wrap: wrap; }
      .btn {
        appearance: none; border: 1px solid var(--card-border); background: #fff; color: #0f172a;
        padding: 10px 14px; border-radius: 999px; font-weight: 600; cursor: pointer;
      }
      .btn.primary { background: var(--brand); color: #fff; border-color: transparent; }
      .btn:focus { outline: 2px solid var(--brand); outline-offset: 2px; }
      .muted { font-size: 12px; opacity: 0.75; margin-top: 8px; }
    </style>
  </head>
  <body>
    <main class="card" role="main" aria-labelledby="title">
      <h1 id="title">You’re offline</h1>
      <p>It looks like your device is offline. Some features require an internet connection. You can try again or continue browsing cached pages.</p>
      <div class="actions">
        <button class="btn primary" onclick="window.location.reload()">Try again</button>
        <button class="btn" onclick="history.back()">Go back</button>
      </div>
      <p class="muted">RideOn Nigeria — Safe, Reliable, Professional.</p>
    </main>
  </body>
</html>
